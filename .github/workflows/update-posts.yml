name: Update Facebook Posts

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-posts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch posts from Facebook
        env:
          FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
          FACEBOOK_PAGE_ID: '842442602292665'
        run: node scripts/fetch-posts.js

      - name: Categorize posts
        run: node scripts/categorize-posts.js

      - name: Merge new posts into existing data
        run: |
          node -e "
          const fs = require('fs');
          const newPosts = JSON.parse(fs.readFileSync('scripts/categorized_posts.json', 'utf-8'));
          const existing = JSON.parse(fs.readFileSync('src/data/posts.json', 'utf-8'));

          console.log('Facebook returned: ' + newPosts.length + ' posts');
          console.log('Existing posts: ' + existing.length);

          if (newPosts.length < 10 && existing.length > 100) {
            console.log('WARNING: Facebook returned too few posts. Skipping to prevent data loss.');
            process.exit(0);
          }

          const existingMap = new Map(existing.map(p => [p.id, p]));
          let added = 0;
          for (const post of newPosts) {
            if (!existingMap.has(post.id)) {
              existingMap.set(post.id, post);
              added++;
            }
          }

          const merged = Array.from(existingMap.values())
            .sort((a, b) => new Date(b.created_time) - new Date(a.created_time));

          fs.writeFileSync('src/data/posts.json', JSON.stringify(merged, null, 2), 'utf-8');
          console.log('New posts added: ' + added + ', Total: ' + merged.length);
          "

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet src/data/ || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"

          # Save our updated files
          cp src/data/posts.json /tmp/updated_posts.json
          cp src/data/categories.json /tmp/updated_categories.json

          # Pull latest from remote (avoids rebase conflicts)
          git checkout -- .
          git pull origin main

          # Restore our updates
          cp /tmp/updated_posts.json src/data/posts.json
          cp /tmp/updated_categories.json src/data/categories.json

          # Commit and push
          git add src/data/posts.json src/data/categories.json
          git diff --cached --quiet || git commit -m "Auto-update: Fetch latest Facebook posts"
          git push
