name: Update Facebook Posts

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-posts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch posts from Facebook
        env:
          FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
          FACEBOOK_PAGE_ID: '842442602292665'
        run: node scripts/fetch-posts.js

      - name: Categorize new posts with AI and merge
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/categorize-with-ai.js

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet src/data/ || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"

          # Save our updated files
          cp src/data/posts.json /tmp/updated_posts.json

          # Pull latest from remote (avoids rebase conflicts)
          git checkout -- .
          git pull origin main

          # Restore our updates
          cp /tmp/updated_posts.json src/data/posts.json

          # Commit and push
          git add src/data/posts.json
          git diff --cached --quiet || git commit -m "Auto-update: Fetch latest Facebook posts"
          git push
